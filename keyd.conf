[ids]
*

[main]
# --- 物理键互换 ---
# 物理 Alt(64) → 发出 Super/Meta，c/v 等改为 Ctrl 组合
# 物理 Win(133) → 发出 Alt
leftmeta = leftalt
leftalt = layer(meta_mac)

# mac 层（:M = 修饰键层，未绑定的键自动带 Meta 修饰符）
[meta_mac:M]
# 复制
c = C-c     
# 粘贴
v = C-v     
# 剪贴
x = C-x     
# 全选
a = C-a     
# 中断
z = C-z     
# 跳转下一步
o = C-o     
# 跳转上一步
i = C-i     
# 终端/浏览器新建tab
t = C-t     
# 终端/浏览器关闭tab
w = C-w     



### 注意 keyd.conf 不支持行尾加注释，会导致配置失效
